<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#101321">
    <meta
      name="description"
      content="Sign up for the Moodix app version and get early access to daily mood-based music recommendations."
    >
    <title>Moodix | App waitlist</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="signup-page">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Moodix home">
        <span class="brand-mark" aria-hidden="true">mx</span>
        <span>Moodix</span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html#checkin">Mood check</a>
        <a href="index.html#import">Import</a>
        <a href="index.html#results">Results</a>
      </nav>
      <a class="header-cta" href="index.html">Try prototype</a>
    </header>

    <main>
      <section class="signup-hero" aria-labelledby="signup-title">
        <div class="signup-copy">
          <p class="eyebrow">App version waitlist</p>
          <h1 id="signup-title">Take Moodix with you every day.</h1>
          <p>
            Join early access for weekly check-ins, smarter playlist imports, and mood matches that follow your routine from Monday to Sunday.
          </p>
        </div>

        <form class="signup-card" data-signup-form>
          <label for="signup-name">Name</label>
          <input id="signup-name" name="name" type="text" autocomplete="name" placeholder="Your name">

          <label for="signup-email">Email</label>
          <input id="signup-email" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>

          <label for="signup-source">Preferred music source</label>
          <select id="signup-source" name="source">
            <option>Spotify</option>
            <option>Apple Music</option>
            <option>YouTube Music</option>
            <option>SoundCloud</option>
            <option>Other</option>
          </select>

          <button class="button primary" type="submit">Join the app waitlist</button>
          <p class="form-note" data-signup-note></p>
        </form>
      </section>
    </main>

    <script src="app.js?v=1" defer></script>
  </body>
</html>
