<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#20150f">
    <title>Moodix | Refreshing</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 50% 30%, rgba(255, 209, 102, 0.28), transparent 30%),
          linear-gradient(135deg, #20150f, #3a2114);
        color: #fffaf0;
      }

      main {
        width: min(680px, calc(100vw - 32px));
        text-align: center;
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2.6rem, 9vw, 5.8rem);
        line-height: 0.95;
      }

      p {
        color: rgba(255, 250, 240, 0.78);
        font-size: 1.08rem;
        line-height: 1.6;
      }

      a {
        color: #ffd166;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Refreshing Moodix</p>
      <h1>Loading the new experience.</h1>
      <p>If this page does not redirect, <a href="index.html?fresh=1">open Moodix again</a>.</p>
    </main>

    <script>
      async function refreshMoodix() {
        if ("serviceWorker" in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }

        if ("caches" in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter((key) => key.startsWith("moodix-")).map((key) => caches.delete(key)));
        }

        window.location.replace(`index.html?fresh=${Date.now()}`);
      }

      refreshMoodix().catch(() => {
        window.location.replace(`index.html?fresh=${Date.now()}`);
      });
    </script>
  </body>
</html>
